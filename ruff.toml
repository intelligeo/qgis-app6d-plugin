line-length = 120

[lint]
# Rules enabled
select = ["E", "F", "W", "B"]

ignore = [
    "F401",   # imported but unused ('from __future__ import annotations' is intentional)
    "B404",   # import subprocess (flagged but needed for cross-platform log open)
    "B603",   # subprocess call without shell=True is safe here
    "B607",   # partial executable path in subprocess
]

[lint.per-file-ignores]
"qgis_app6d/__init__.py" = ["F401", "F403"]
