[flake8]
max-line-length = 120
extend-ignore =
    # W503: line break before binary operator – we use Knuth/Black style (operator at start of line)
    W503,
    # E221/E241: extra spaces for visual alignment in data tables (catalog_data, sidc, modifiers…)
    E221,
    E241,
    # F401: 'from __future__ import annotations' is intentional for Python 3.9 compat
    F401,
    # E501: long lines are already covered by max-line-length above; suppress residual hits
    E501

per-file-ignores =
    # Allow star-imports and broad exception handling in the QGIS plugin init boilerplate
    qgis_app6d/__init__.py: F401, F403

